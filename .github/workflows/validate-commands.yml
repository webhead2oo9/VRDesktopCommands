name: Validate commands

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "commands/**"
      - "commands.schema.json"
      - "validate-schema.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/validate-commands.yml"
  pull_request:
    paths:
      - "commands/**"
      - "commands.schema.json"
      - "validate-schema.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/validate-commands.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run validate
